<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Homepage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&family=Source+Serif+4:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="site-nav">
        <div class="nav-inner">
            <a href="#about" class="nav-brand">Bingxuan Zhao</a>
            <div class="nav-links">
                <a href="#about">About</a>
                <a href="#news">News</a>
                <a href="#publications">Publications</a>
                <a href="#education">Education</a>
                <a href="#interests">Beyond Research</a>
            </div>
        </div>
    </nav>

    <main class="page-shell">
        <aside class="profile-sidebar">
            <div class="profile-sidebar-inner">
                <div class="avatar-frame">
                    <img id="profile-avatar" src="" alt="Portrait">
                </div>

                <div class="profile-block">
                    <h1 id="profile-name-main" class="profile-name"></h1>
                    <p id="profile-role" class="profile-role"></p>
                    <p id="profile-uni" class="profile-affiliation"></p>
                    <p id="profile-current-focus" class="profile-focus"></p>
                </div>

                <p id="profile-motto" class="profile-motto"></p>
                <p id="profile-avatar-caption" class="avatar-caption hidden"></p>

                <div class="profile-meta">
                    <div class="profile-meta-row">
                        <i class="fa-solid fa-location-dot"></i>
                        <span id="profile-location"></span>
                    </div>
                    <a id="profile-email-link" class="profile-meta-row" href="#">
                        <i class="fa-solid fa-envelope"></i>
                        <span id="profile-email"></span>
                    </a>
                    <a id="profile-link-github" class="profile-meta-row hidden" href="#" target="_blank" rel="noreferrer">
                        <i class="fa-brands fa-github"></i>
                        <span>GitHub</span>
                    </a>
                    <a id="profile-link-scholar" class="profile-meta-row hidden" href="#" target="_blank" rel="noreferrer">
                        <i class="fa-solid fa-graduation-cap"></i>
                        <span>Google Scholar</span>
                    </a>
                    <a id="profile-link-cv" class="profile-meta-row hidden" href="#" target="_blank" rel="noreferrer">
                        <i class="fa-regular fa-file-lines"></i>
                        <span>Curriculum Vitae</span>
                    </a>
                </div>

                <div id="profile-focus-tags" class="focus-tags"></div>

                <div class="profile-sidebar-sections">
                    <section id="education" class="sidebar-section">
                        <div class="sidebar-section-header">
                            <h2 class="sidebar-section-title">
                                <span class="section-emoji">&#x1F393;</span>
                                <span>Education</span>
                            </h2>
                        </div>
                        <div id="education-list" class="simple-list"></div>
                    </section>

                    <section id="interests" class="sidebar-section sidebar-section-last">
                        <div class="sidebar-section-header">
                            <h2 class="sidebar-section-title">
                                <span class="section-emoji">&#x1F33F;</span>
                                <span>Beyond Research</span>
                            </h2>
                        </div>
                        <div id="interests-grid" class="interest-grid"></div>
                    </section>
                </div>
            </div>
        </aside>

        <div class="content-column">
            <section id="about" class="content-section">
                <div class="section-header">
                    <h2 class="section-title">
                        <span class="section-emoji">&#x1F98A;</span>
                        <span>About Me</span>
                    </h2>
                </div>

                <div class="about-copy">
                    <p id="profile-bio" class="lead-paragraph"></p>
                    <p id="profile-research-statement" class="body-paragraph"></p>
                    <ul id="about-highlights" class="note-list"></ul>
                </div>
            </section>

            <section id="news" class="content-section">
                <div class="section-header">
                    <h2 class="section-title">
                        <span class="section-emoji">&#x1F525;</span>
                        <span>News</span>
                    </h2>
                </div>
                <ul id="news-list" class="news-list"></ul>
            </section>

            <section id="publications" class="content-section">
                <div class="section-header">
                    <h2 class="section-title">
                        <span class="section-emoji">&#x1F4DD;</span>
                        <span>Selected Publications</span>
                    </h2>
                    <button id="show-more-btn" type="button" class="section-action" data-state="collapsed">
                        <span>Show All</span>
                    </button>
                </div>
                <div id="publication-list" class="publication-list"></div>
            </section>

            <section id="honors" class="content-section content-section-last">
                <div class="section-header">
                    <h2 class="section-title">
                        <span class="section-emoji">&#x1F3C5;</span>
                        <span>Honors</span>
                    </h2>
                </div>
                <div id="honors-list" class="simple-list compact-list"></div>
            </section>
        </div>
    </main>

    <footer class="site-footer">
        <p>&copy; <span id="footer-year"></span> <span id="footer-name"></span>.</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
